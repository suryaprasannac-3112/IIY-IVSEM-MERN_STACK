<!doctype html>
<html>
  <head>
    <title>Simple Selectors</title>

    <style>
      /* Universal selector */
      * {
        font-family: Arial;
      }

      /* Element selector */
      p {
        color: blue;
      }

      /* ID selector */
      #title {
        color: red;
      }

      /* Class selector */
      .text {
        color: green;
      }

      /* Group selector */
      h2,
      h3 {
        background-color: lightgray;
      }
    </style>
  </head>

  <body>
    <h1 id="title">CSS Simple Selectors</h1>

    <h2>Group Selector Example</h2>
    <h3>Another Heading</h3>

    <p>This paragraph uses element selector.</p>

    <p class="text">This paragraph uses class selector.</p>
  </body>
</html>
