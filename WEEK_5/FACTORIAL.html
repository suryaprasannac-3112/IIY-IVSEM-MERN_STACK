<!doctype html>
<html>
  <head>
    <title>Factorial</title>
    <script>
      function factorial() {
        let n = document.getElementById("num").value;
        let fact = 1;

        for (let i = 1; i <= n; i++) {
          fact = fact * i;
        }

        document.getElementById("result").innerHTML = "Factorial = " + fact;
      }
    </script>
  </head>

  <body>
    <h3>Factorial Program</h3>

    Enter Number: <input type="number" id="num" /><br /><br />

    <button onclick="factorial()">Find Factorial</button>

    <p id="result"></p>
  </body>
</html>
