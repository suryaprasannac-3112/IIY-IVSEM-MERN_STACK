<!doctype html>
<html>
  <head>
    <title>Print Numbers</title>
  </head>

  <body>
    <h2>Printing Numbers from 1 to 10</h2>

    <script>
      // For loop
      document.write("For Loop<br>");
      for (let i = 1; i <= 10; i++) {
        document.write(i + "<br>");
      }

      // While loop
      document.write("<br>While Loop<br>");
      let i = 1;

      while (i <= 10) {
        document.write(i + "<br>");
        i++;
      }

      // Do While loop
      document.write("<br>Do While Loop<br>");
      i = 1;

      do {
        document.write(i + "<br>");
        i++;
      } while (i <= 10);
    </script>
  </body>
</html>
