<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>CSS Colours</title>

    <style>
      /* color name */
      .color-name {
        color: blue;
      }

      /* hexadecimal */
      .hex-color {
        color: #ff5733;
      }

      /* rgb */
      .rgb-color {
        color: rgb(60, 179, 113);
      }

      /* rgba */
      .rgba-color {
        color: rgba(255, 0, 0, 0.5);
      }

      /* hsl */
      .hsl-color {
        color: hsl(240, 100%, 50%);
      }

      /* hsla */
      .hsla-color {
        color: hsla(302, 65%, 27%, 0.5);
      }
    </style>
  </head>

  <body>
    <h1>Different Ways to Specify Colors in CSS</h1>

    <h2 class="color-name">Color Name (Blue)</h2>
    <h2 class="hex-color">Hex Color (#ff5733)</h2>
    <h2 class="rgb-color">RGB Color (60, 179, 113)</h2>
    <h2 class="rgba-color">RGBA Color (255, 0, 0, 0.5)</h2>
    <h2 class="hsl-color">HSL Color (240, 100%, 50%)</h2>
    <h2 class="hsla-color">HSLA Color (302, 65%, 27%, 0.5)</h2>
  </body>
</html>
